name: Bug report
description: Report a notifier bug after the plugin is installed.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Use this after Codex Notify is installed and at least one dry-run or live notification has been attempted. Do not paste Pushover credentials, private prompts, or unredacted logs.
  - type: input
    id: version
    attributes:
      label: Plugin version
      description: Example: 1.0.0-rc.1
    validations:
      required: true
  - type: input
    id: codex_version
    attributes:
      label: Codex version and surface
      description: Example: Codex app 0.x on macOS, Codex CLI, IDE extension
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      description: Example: macOS 15.x arm64
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Relevant config
      description: Redact credentials and private paths.
      render: toml
  - type: textarea
    id: logs
    attributes:
      label: Redacted notify.log excerpt
      description: Include recent JSONL lines if available. Redact secrets and private content.
      render: json
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include whether this was dry-run or live Pushover delivery, and whether notification history was enabled.
    validations:
      required: true
